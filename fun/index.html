<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun - OnePage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--surface:#f8f9fc;--surface2:#f0f2f8;--border:#e2e6f0;
  --text:#1a1d2e;--text2:#5a6072;--accent:#3b6ff8;--pink:#ec4899;--gold:#d4a843;--accent-light:#fff5f9;}
body{font-family:'Inter','Noto Serif SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-size:.95rem;font-weight:600;letter-spacing:.03em;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.back{font-size:.78rem;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;padding:8px 14px;border-radius:8px;border:1px solid var(--border)}
.back:hover{color:var(--accent);border-color:var(--accent)}
.hero{position:relative;padding:80px 24px 60px;text-align:center;background:linear-gradient(180deg,#ffffff 0%,#fff5f9 100%)}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:700px;height:700px;
  background:radial-gradient(ellipse,rgba(236,72,153,.06) 0%,transparent 70%);pointer-events:none}
.hero h1{font-size:clamp(2.5rem,7vw,4rem);font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,#1a1d2e 40%,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.hero p{font-size:1.05rem;color:var(--text2);max-width:480px;margin:0 auto;font-family:'Noto Serif SC',serif;line-height:1.7}
.empty-state{position:relative;max-width:480px;margin:0 auto;padding:60px 24px 120px;text-align:center}
.empty-icon{font-size:4rem;margin-bottom:20px;opacity:.25}
.empty-text{font-size:.9rem;color:var(--text2);line-height:1.8;font-family:'Noto Serif SC',serif}
footer{text-align:center;padding:48px 24px;border-top:1px solid var(--border);color:var(--text2);font-size:.75rem;background:var(--surface)}
footer a{color:var(--accent);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<header>
  <a href="../" class="logo"><span>&#8592;</span> OnePage</a>
  <a href="../" class="back">&#8592; Back</a>
</header>
<section class="hero">
  <h1>Fun</h1>
  <p>趣味工具，好玩的小游戏和创意小页面。</p>
</section>
<div class="empty-state">
  <div class="empty-icon">&#x1F389;</div>
  <div class="empty-text">趣味内容正在制作中<br>敬请期待...</div>
</div>
<footer>
  <p>OnePage by <a href="https://github.com/jeekeagle">@jeekeagle</a> &middot; <a href="https://github.com/jeekeagle/OnePage">View on GitHub</a></p>
</footer>
</body>
</html>
