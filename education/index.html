<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education - OnePage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131a;--border:rgba(255,255,255,.07);
  --text:#e8e8ed;--text2:#8888a0;--accent:#6b8afd;--accent2:#8b5cf6;}
body{font-family:'Inter','Noto Serif SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.drama{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.drama::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 20% 20%,rgba(107,138,253,.08) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 80%,rgba(139,92,246,.06) 0%,transparent 50%)}
.grid-dot{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%)}
header{position:relative;z-index:10;padding:24px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-size:1rem;font-weight:600;letter-spacing:.05em;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.back{font-size:.78rem;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.back:hover{color:var(--text)}
.hero{position:relative;z-index:1;padding:80px 24px 60px;text-align:center}
.hero h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,#fff 30%,rgba(107,138,253,.6));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.hero p{font-size:1rem;color:var(--text2);max-width:480px;margin:0 auto;font-family:'Noto Serif SC',serif;line-height:1.7}
.tool-grid{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px 24px 120px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.tool-card{background:var(--surface);border:1px solid rgba(107,138,253,.15);border-radius:16px;overflow:hidden;
  text-decoration:none;display:block;transition:transform .3s,box-shadow .3s}
.tool-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(107,138,253,.15)}
.tool-preview{height:160px;background:linear-gradient(135deg,rgba(107,138,253,.12),rgba(139,92,246,.08));
  display:flex;align-items:center;justify-content:center;font-size:3rem}
.tool-info{padding:16px 20px 20px}
.tool-name{font-size:1rem;font-weight:600;margin-bottom:4px;color:var(--text)}
.tool-desc{font-size:.78rem;color:var(--text2);line-height:1.6;font-family:'Noto Serif SC',serif}
footer{position:relative;z-index:1;text-align:center;padding:40px 24px;border-top:1px solid var(--border);color:var(--text2);font-size:.75rem}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="drama"><div class="grid-dot"></div></div>
<header>
  <a href="../" class="logo"><span>&#8592;</span> OnePage</a>
  <a href="../" class="back">&#8592; Back</a>
</header>
<section class="hero">
  <h1>Education</h1>
  <p>教育学习类工具，帮助掌握汉字、学科知识。</p>
</section>
<div class="tool-grid">
  <a href="stroke-order.html" class="tool-card">
    <div class="tool-preview">&#x7B80;</div>
    <div class="tool-info">
      <div class="tool-name">汉字笔画顺序</div>
      <div class="tool-desc">输入任意汉字，观看笔顺动画，支持描红练习。</div>
    </div>
  </a>
</div>
<footer>
  <p>OnePage by <a href="https://github.com/jeekeagle">@jeekeagle</a> &middot; <a href="https://github.com/jeekeagle/OnePage">View on GitHub</a></p>
</footer>
</body>
</html>
