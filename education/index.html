<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education - OnePage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--surface:#f8f9fc;--surface2:#f0f2f8;--border:#e2e6f0;
  --text:#1a1d2e;--text2:#5a6072;--accent:#3b6ff8;--accent2:#5a8ff8;--accent-light:#eef2ff;}
body{font-family:'Inter','Noto Serif SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:100;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-size:.95rem;font-weight:600;letter-spacing:.03em;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
.back{font-size:.78rem;color:var(--text2);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;padding:8px 14px;border-radius:8px;border:1px solid var(--border)}
.back:hover{color:var(--accent);border-color:var(--accent)}
.hero{position:relative;padding:80px 24px 60px;text-align:center;background:linear-gradient(180deg,#ffffff 0%,var(--accent-light) 100%)}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:700px;height:700px;
  background:radial-gradient(ellipse,rgba(59,111,248,.07) 0%,transparent 70%);pointer-events:none}
.hero h1{font-size:clamp(2.5rem,7vw,4rem);font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,#1a1d2e 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.hero p{font-size:1.05rem;color:var(--text2);max-width:480px;margin:0 auto;font-family:'Noto Serif SC',serif;line-height:1.7}
.tool-grid{position:relative;max-width:1100px;margin:0 auto;padding:24px 24px 120px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.tool-card{background:var(--bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;
  text-decoration:none;display:block;transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s cubic-bezier(.22,1,.36,1)}
.tool-card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(59,111,248,.1)}
.tool-preview{height:160px;background:linear-gradient(160deg,#eef2ff 0%,#e4e9ff 100%);
  display:flex;align-items:center;justify-content:center;font-size:3rem}
.tool-info{padding:18px 22px 22px}
.tool-name{font-size:1rem;font-weight:600;margin-bottom:5px;color:var(--text)}
.tool-desc{font-size:.8rem;color:var(--text2);line-height:1.6;font-family:'Noto Serif SC',serif}
.tool-badge{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:100px;
  background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.2);margin-top:6px;font-weight:500}
footer{text-align:center;padding:48px 24px;border-top:1px solid var(--border);color:var(--text2);font-size:.75rem;background:var(--surface)}
footer a{color:var(--accent);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<header>
  <a href="../" class="logo"><span>&#8592;</span> OnePage</a>
  <a href="../" class="back">&#8592; Back</a>
</header>
<section class="hero">
  <h1>Education</h1>
  <p>教育学习类工具，帮助掌握汉字、学科知识。</p>
</section>
<div class="tool-grid">
  <a href="stroke-order-offline.html" class="tool-card">
    <div class="tool-preview">&#x7B80;</div>
    <div class="tool-info">
      <div class="tool-name">汉字笔画顺序</div>
      <div class="tool-desc">输入任意汉字，观看笔顺动画，支持描红练习。</div>
      <span class="tool-badge">离线版 - 无需网络</span>
    </div>
  </a>
</div>
<footer>
  <p>OnePage by <a href="https://github.com/jeekeagle">@jeekeagle</a> &middot; <a href="https://github.com/jeekeagle/OnePage">View on GitHub</a></p>
</footer>
</body>
</html>
